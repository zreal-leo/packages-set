name: Publish Package

on:
    push:
        tags:
            - 'v*'
        branches:
            - main

permissions:
    id-token: write
    contents: read

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  registry-url: 'https://registry.npmjs.org'
            - run: pnpm i
            - run: pnpm changeset publish
